name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test (Vitest, workers pool)
        run: bun run test

      - name: Build (Vite + Worker)
        run: bun run build
