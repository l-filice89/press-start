name: CI

# push is scoped to main so a PR head SHA gets exactly ONE "CI OK" check run
# — otherwise the push-event run (which legitimately skips burn-in) races the
# pull_request run for the same required-check name in branch protection.
on:
  push:
    branches: [main]
  pull_request:

# Superseded pushes to the same branch cancel the older run — no point
# finishing CI for a commit that is no longer the tip.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test (Vitest, workers pool)
        run: bun run test

      - name: Build (Vite + Worker)
        run: bun run build

  # E2e tier (Epic 2.5): real chromium against vite dev + Worker + local D1
  # (`e2e` wrangler env). Global-setup boots the server and signs in via the
  # console-email magic link; secrets come from the committed .dev.vars.e2e.
  # Runs in parallel with quality-gate for fastest feedback.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Upload e2e failure artifacts (report, traces, videos)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Burn-in (flaky detection): e2e specs touched by this PR run 5x with
  # retries disabled — a spec that can't pass 5/5 clean is flaky and must not
  # merge. Skips itself when the PR touches no e2e specs.
  e2e-burn-in:
    name: E2E burn-in (changed specs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed e2e specs
        id: changed
        env:
          # Security: user-influenceable context passed through env, not interpolated
          BASE_REF: ${{ github.base_ref }}
        run: |
          specs=$(git diff --name-only --diff-filter=d "origin/$BASE_REF"...HEAD -- 'playwright/e2e/**/*.spec.ts' | tr '\n' ' ')
          echo "specs=$specs" >> "$GITHUB_OUTPUT"
          echo "Changed e2e specs: ${specs:-none}"

      - name: Setup Bun
        if: steps.changed.outputs.specs != ''
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (frozen lockfile)
        if: steps.changed.outputs.specs != ''
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.changed.outputs.specs != ''
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium
        if: steps.changed.outputs.specs != ''
        run: bunx playwright install --with-deps chromium

      - name: Burn-in changed specs (5x, no retries)
        if: steps.changed.outputs.specs != ''
        env:
          # Security: diff-derived filenames passed through env, not shell-interpolated
          SPECS: ${{ steps.changed.outputs.specs }}
        run: |
          # ponytail: --repeat-each replaces the classic bash burn-in loop; bump to 10 if flakes slip through
          # --workers 1: repeats of one spec must not run concurrently — the
          # auth-journey repeats would steal each other's single-use magic links
          bunx playwright test $SPECS --repeat-each 5 --retries 0 --workers 1

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-burn-in-failure-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Single merge gate (AR-23): branch protection needs exactly one required
  # check — point it at "CI OK". Fails if any upstream job failed or was
  # cancelled; burn-in may legitimately skip (push events, no changed specs).
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [quality-gate, e2e, e2e-burn-in]
    if: always()
    steps:
      - name: Verify all gates passed
        env:
          RESULTS: ${{ toJSON(needs) }}
        # Iterates every `needs` entry so a job added to `needs` can never be
        # forgotten here. Only e2e-burn-in may skip (push events / no changed
        # specs); a skipped required job is a failure, not a pass.
        run: |
          echo "$RESULTS"
          failed=0
          for job in $(echo "$RESULTS" | jq -r 'keys[]'); do
            result=$(echo "$RESULTS" | jq -r ".\"$job\".result")
            if [ "$result" = "success" ] || { [ "$job" = "e2e-burn-in" ] && [ "$result" = "skipped" ]; }; then
              echo "$job: $result (ok)"
            else
              echo "::error::$job result: $result"
              failed=1
            fi
          done
          exit $failed
