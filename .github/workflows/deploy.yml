name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Migrate then deploy
    runs-on: ubuntu-latest
    # Optional manual-approval gate: configure this as a Protected Environment
    # (Settings > Environments > production > required reviewers) so
    # destructive migrations can be paused before they run. The workflow step
    # order below is what actually enforces "migrations before deploy"; the
    # environment gate is an extra human checkpoint on top of that.
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Build (Vite + Worker)
        run: bun run build

      # AD-16: migrations always run before deploy, never at Worker startup.
      # If this step fails, the job stops here and the deploy step below
      # never runs.
      - name: Apply D1 migrations (remote)
        run: bunx wrangler d1 migrations apply ps-game-catalog --remote

      - name: Deploy Worker
        run: bunx wrangler deploy
