name: Deploy

# Production ships on an explicit act, not on every merge: a PR landing on main
# is not automatically a release. Publishing a GitHub Release (which carries the
# tag and the notes) is the trigger; `workflow_dispatch` stays as the escape
# hatch for a redeploy of the current release (infra-only change, failed run) at
# a ref you choose.
#
# `release: published` checks out the released TAG, not main's HEAD — anything
# merged after the tag ships with the next release, which is the whole point.
on:
  release:
    types: [published]
  workflow_dispatch:

# Two rapid releases must not race wrangler d1 migrations apply /
# wrangler deploy against the same production D1 database — queue instead
# of running concurrently, and never cancel a deploy mid-flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Verify, migrate, then deploy
    runs-on: ubuntu-latest
    # Optional manual-approval gate: configure this as a Protected Environment
    # (Settings > Environments > production > required reviewers) so
    # destructive migrations can be paused before they run. The workflow step
    # order below is what actually enforces "migrations before deploy"; the
    # environment gate is an extra human checkpoint on top of that.
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      # A release cut from a commit that skipped/raced CI must not deploy broken
      # or unlinted code — re-run the same gate CI runs.
      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test (Vitest, workers pool)
        run: bun run test

      - name: Build (Vite + Worker)
        run: bun run build

      # AD-16: migrations always run before deploy, never at Worker startup.
      # If this step fails, the job stops here and the deploy step below
      # never runs.
      - name: Apply D1 migrations (remote)
        run: bunx wrangler d1 migrations apply ps-game-catalog --remote

      - name: Deploy Worker
        id: deploy
        run: |
          bunx wrangler deploy | tee /tmp/deploy.log
          url=$(grep -oE 'https://[^ ]+\.workers\.dev' /tmp/deploy.log | head -n1)
          if [ -z "$url" ]; then
            echo "Could not find the deployed URL in wrangler's output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # GitHub Actions secrets and Cloudflare Worker secrets are separate
      # stores — `wrangler deploy` never syncs one into the other. Push them
      # explicitly on every deploy (idempotent: `secret put` overwrites).
      # RESEND_API_KEY is optional (empty falls back to the console email
      # provider); BETTER_AUTH_SECRET is required or every /api/auth/* route
      # throws (services/auth.ts fails loud on purpose — AD-14).
      # IGDB_CLIENT_ID/SECRET power the add-by-name search + straggler
      # resolution; without them those degrade to name-only adds. Synced here
      # too so a fresh redeploy never silently drops them (the client id is a
      # public Twitch app id, kept as a secret only for a uniform sync path).
      - name: Sync auth + IGDB secrets to the Worker
        run: |
          echo "${{ secrets.BETTER_AUTH_SECRET }}" | bunx wrangler secret put BETTER_AUTH_SECRET
          echo "${{ secrets.RESEND_API_KEY }}" | bunx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.IGDB_CLIENT_ID }}" | bunx wrangler secret put IGDB_CLIENT_ID
          echo "${{ secrets.IGDB_CLIENT_SECRET }}" | bunx wrangler secret put IGDB_CLIENT_SECRET

      # A successful `wrangler deploy` only means the upload succeeded, not
      # that the Worker actually serves traffic correctly — smoke-test it
      # before calling the pipeline green. The auth check catches exactly the
      # "secret missing in prod" failure mode: every /api/auth/* route throws
      # a uniform 500 if BETTER_AUTH_SECRET isn't set, even for a routes that
      # don't touch a session (see createAuth in services/auth.ts).
      - name: Verify deploy (GET /api/health, GET /api/auth/get-session)
        run: |
          status=$(curl -s -o /tmp/health.json -w "%{http_code}" "${{ steps.deploy.outputs.url }}/api/health")
          echo "HTTP $status: $(cat /tmp/health.json)"
          if [ "$status" != "200" ]; then
            echo "Deployed Worker's /api/health did not return 200" >&2
            exit 1
          fi

          auth_status=$(curl -s -o /tmp/auth.json -w "%{http_code}" "${{ steps.deploy.outputs.url }}/api/auth/get-session")
          echo "HTTP $auth_status: $(cat /tmp/auth.json)"
          if [ "$auth_status" != "200" ]; then
            echo "Deployed Worker's /api/auth/get-session did not return 200 — auth secrets likely missing" >&2
            exit 1
          fi
