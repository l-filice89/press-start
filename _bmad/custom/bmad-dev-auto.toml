# Team override for bmad-dev-auto.
# Why: bmad-loop has no background-completion re-invocation. In run
# 20260706-210617-8ef7 every dev attempt on stories 1-3 and 1-4 delegated
# step-03 implementation to a background subagent and ended its turn to wait;
# the orchestrator saw a result-less Stop, exhausted its nudge budget, and
# killed the session while the subagent was still building. This fact keeps
# dev sessions working in the foreground so the orchestrator can track them.

[workflow]

persistent_facts = [
  "ORCHESTRATION CONSTRAINT (bmad-loop): perform ALL work — especially step-03 implementation — in the main session, in the foreground. Never delegate work to BACKGROUND or detached agents, and never end your turn to wait on a background process — the bmad-loop orchestrator cannot detect background-agent completion; it will treat the idle session as stalled and kill it, discarding the in-flight work. Synchronous subagents awaited in the same turn (e.g. the mandatory step-04 review subagents via TaskOutput block:true) are fine and expected.",
  "HAZARD-TEST RULE (Epic 1 retro, 2026-07-08): if an acceptance criterion names a specific hazard, invariant, or failure mode to guard against (e.g. \"API routes must be checked before the SPA fallback\", \"membership-sourced entries are excluded, count reported\", \"started_on stamped once, write-once\"), the story is not done until a test exists that asserts exactly that behavior — red-then-green, not just \"the suite passes\". This was written after three Epic 1 production incidents (a shadowed-route bug, a seed-import exclusion bug, and a missing-secret deploy bug) each shipped past a review pass despite the exact hazard being named in the spec or raised live. Passing lint/typecheck/the existing suite is not sufficient evidence the named hazard is covered — check for it explicitly during step-03 and step-04.",
  "PLAYWRIGHT-COVERAGE RULE (Epic 2 retro, TR-3, story 2.5.4): an AC has a UI user flow when a user could observe or drive the behavior through the rendered app. Every AC with a UI flow ships with a Playwright e2e test in the SAME story — a test that asserts that AC's behavior and runs green in the story's verification (suite conventions: playwright/README.md). Every other AC gets a playwright/COVERAGE.md row in the same story (the file is keyed by epic AC; map story ACs onto their epic rows, ad-hoc stories get their own section) whose reason names what blocks it (no UI flow / unreachable until <epic-N feature>) or what covers it instead; a story with no UI-facing ACs at all may add one summary line. A story that makes a previously-unreachable flow reachable converts the matching skip rows into tests in that same story. This rule and the HAZARD-TEST rule apply independently: a Vitest hazard test does not exempt a UI-flow AC from Playwright, nor vice versa. If the Playwright foundation itself is broken, HALT blocked citing the infra failure — never write a false skip reason. Definition of done: EVERY AC in the story has either a passing Playwright test or a COVERAGE.md row — audit that map during step-03 and step-04.",
  "PROBE-BEFORE-YOU-MAP RULE (Epic 4 retro, 2026-07-11): any story touching an external provider's error/failure handling starts with a live probe of the real failure modes — do not model the wire contract from HTTP convention or a happy-path reference script. Epic 4's one production bug shipped because expired-cookie handling was keyed off 401/403 by convention, while real PSN answers 200 + a GraphQL \"Access denied\" error; the WEBMAF entitlement gap shared the root. Hazard fixtures for these paths use CAPTURED real payloads (dated, verbatim), never hand-written ones — a stub built from the assumption verifies the assumption, not reality. Applies during step-03 and step-04 for any adapter/provider error branch.",
  "DEGENERATE-RESPONSE GUARD RULE (Epic 5 retro, 2026-07-11): any external-data → automated-write path must explicitly handle the DEGENERATE response — syntactically valid, semantically empty/nothing — before it drives a write, with a hazard test built from a CAPTURED payload asserting existing state SURVIVES it. Two epics running, the highest-severity finding was this exact shape: PSN answered an expired cookie with HTTP 200 + a GraphQL denial (Epic 4, shipped to production), and the PS+ Extra catalog answered with an empty-but-200 product list that wiped every flag (Epic 5, caught in review only because reviewers were primed from Epic 4). \"The fetch succeeded\" is not \"the data is real\": an empty list, a 200 carrying an error body, a null/missing collection must fail closed (skip the write, surface a retryable error) never be treated as authoritative emptiness that clears state. Sibling of PROBE-BEFORE-YOU-MAP: probe finds the real shapes, this rule guards the degenerate one. Check every provider→write path at step-03 and step-04; the guard is a rule, not a primed-reviewer reflex.",
  "SAMPLE-OF-ONE RULE (Epic 9 retro, 2026-07-14): a spec may NOT assert a constant, enum value, or distribution that ranges over a POPULATION from a single observed instance. Either probe the population and record the real distribution (dated, in the spec), or carry the value as a per-item field read from the data. Epic 9's worst near-miss: story 9.3's spec pinned the trophy-detail `npServiceName` to `trophy2` from ONE PS5 sample; a live probe run only because a reviewer challenged it measured 94 of the account's 137 titles on `trophy` (PS3/PS4/Vita), and the wrong name answers 404 — so most of a real user's platinums would have been silently reported as delisted, into a write-once column, permanently unrecoverable. Sibling of PROBE-BEFORE-YOU-MAP, which it extends from failure modes to population shape: probing one happy-path response tells you the SHAPE of a record, never the DISTRIBUTION across records. At step-02/step-03, for every constant a spec asserts about external data, ask: how many instances was this observed on, and does it vary per item? An unprobed distribution is carried as a field or blocked, never as a constant.",
  "BUDGET-COUNTS-EVERY-SUBREQUEST RULE (Epic 9 retro, 2026-07-14): any spec claiming a resource budget (Workers' 50-subrequest ceiling, chunk sizes, fan-out limits) must ENUMERATE every consumer with the arithmetic written out — external fetches AND D1 binding calls AND middleware's own reads — not just the ones the story is thinking about. Epic 9 shipped this bug twice: story 9.2's budget counted 4 fetches and ignored ~137 sequential D1 UPDATEs (D1 binding calls count toward the subrequest limit; the mock could not see them, so every test passed), and story 9.3's chunk size ignored the auth middleware's own D1 reads. A budget a mock cannot observe is not a budget — it is a hope. At step-03 and step-04, restate the arithmetic honestly against the real runtime's accounting, and prefer a batched write (`db.batch()`) over a per-row loop on any path whose row count scales with the library.",
  "TEST-THE-BYPASS-NOT-JUST-THE-REFUSAL RULE (Story 9.5, 2026-07-14): when a change adds a GUARD (a lock, an auth check, a rate limit, a validation boundary), enumerate every code path that reaches the guarded resource and test the BYPASS path, not only the refusal path. A guard whose bypass path has no test is not a guard. Story 9.5 shipped a single-flight lock into review with the refusal path tested and green (a second sync gets a 409, PSN untouched) while the CONTINUATION path — the backfill's chunked client loop, which re-enters the same route with different parameters — had ZERO tests. That was precisely the path that was bypassable, and precisely why the test suite could not see it: both reviewers found it, no test would have. At step-03, for each guard, list the entrypoints (a second route, a retry, a resumed loop, a different parameter shape) and write the test that tries to GET THROUGH; at step-04, if a guard's entrypoint list is not covered, that is a finding, not a nit. Sibling of the HAZARD-TEST RULE: that one demands a test for a named hazard, this one demands a test for the way around the fix.",
  "CAPABILITY-IS-NOT-AN-IDENTIFIER RULE (Story 9.5, 2026-07-14): a value the SERVER published to the client — a row id, a cursor, a page token, a filename, a sequence number — is never proof of ownership, permission, or authorship. If a request must prove that it is the one who started an operation, it presents a CAPABILITY the server minted for that purpose: unguessable (a uuid/random token), checked against stored state in the same statement that acts on it, and ideally rotated on each use so a replay of a spent one fails. Story 9.5's lock keyed its cross-request continuation on the backfill's CURSOR — but a cursor is a `game_id` the endpoint prints in its own response body (and in a failed chunk's partial report), so `?cursor=anything` would have overwritten a RUNNING sync's lock, fanned out to PSN beside it, then deleted the lock on the way out. The fix was a rotating token, not a better cursor. At step-02/step-03, for any value a request presents as authority, ask: did the server mint this as a secret, or merely hand it back as data? If the latter, it authorizes nothing.",
  "FOLLOW-UP-REVIEW CONTRACT (Epic 4 retro, 2026-07-11; re-homed from retired bmad-loop policy.toml): a story finishing with followup_review_recommended: true does NOT reach the epic's merge gate until an independent review pass runs over its change (second-opinion angles + verify) OR a decline is recorded with reason. The gate previously lived in bmad-loop's policy file and died silently when the tool was retired on Windows — three Epic 4 stamps sat unconsumed and a named hazard shipped. It lives here now because this customization file survived the retirement. Check the story's followup_review_recommended flag at step-04; if set, run or record the independent pass before marking the epic mergeable.",
  "FOLLOW-UP-REVIEW AUTO-FORCE ON HIGH (Epic 6 retro, 2026-07-12): a HIGH-severity inline review finding on a story FORCES the independent follow-up pass above, regardless of the author's followup_review_recommended stamp — and unlike the self-stamp path it CANNOT be declined away. Extends the FOLLOW-UP-REVIEW CONTRACT: that gate consumes the author's self-assessment; this one adds a trigger the author cannot clear. Rationale: Epic 6 proved the self-stamp gate fires and works (6.4/6.5), but a self-stamp is still author discretion, and a HIGH finding is exactly the severity where a second opinion must not be optional. At step-04, if ANY inline finding is HIGH, treat followup_review_recommended as true and run the independent pass before marking the epic mergeable — no decline branch for HIGH.",
  "DELEGATED-WORK-CARRIES-AN-AC RULE (Epic 7 retro, 2026-07-15): when a story delegates work to another story — 'X owns that loop', 'lands with 7.2', a residual-risk line naming a later owner — the RECEIVING story's spec MUST carry at least one acceptance criterion that verifies the delegated work was actually done. Prose in an Auto Run Result, a residual-risks note, or a code comment is NOT a carrier: it has no gate, no test, and no owner-of-record. Epic 7 shipped exactly this hole: story 7.1's result recorded 'no client drives the sweep yet — 7.2 owns that loop', 7.2 shipped only the read endpoints, every reviewer did their job (the gap was in no story's diff), and ps_plus_catalog_genre stayed empty in every environment until the user noticed dead genre chips days later. At step-02, when planning a story, grep the epic's earlier specs (Auto Run Result, residual risks, review triage) for delegations naming this story and convert each into an AC; at step-04, a delegation whose receiving story lacks the AC is a finding against the SPEC, not a nit.",
  "UI-MOCK-GATE RULE (Epic 10 retro, 2026-07-16): any story or spec whose acceptance criteria touch a RENDERED surface must carry a lightweight placement mock — ASCII layout, annotated sketch, or throwaway HTML snippet, whichever is fastest — showing WHERE each new element sits on every affected surface (card, detail panel, modal, catalog, filter bar), with Luca's recorded sign-off BEFORE implementation starts. Placement-level only, never pixel-level: the mock pins position and hierarchy; behavior stays in the ACs. Written after Epic 10 shipped every feature behaviorally correct and then spent four layout-churn commits plus an entire follow-on spec (spec-leaving-date-detail-catalog.md) chasing where things SIT — the leaving date reached detail/catalog/filter only after Luca saw the built card, and story 10.5's one medium was the add modal's PRIMARY path showing no scores while the correction picker did. Specs pin behavior precisely and presentation loosely, and the gap gets closed by the most expensive feedback loop available (build → react → rework) when a minutes-cheap mock closes it before code. At step-02, a UI-touching spec with no signed-off mock is a BLOCK, not a nit — same posture as EXTERNAL-RISK-FLAG. Keep the mock small enough that this never becomes a design-document stage; if drawing it takes longer than reading the spec, it is too detailed.",
  "EXTERNAL-RISK-FLAG RULE (Epic 11 retro, 2026-07-16): any epic, story, or spec that touches a third-party service MUST carry an explicit, named risk assessment covering (a) terms-of-service breach, (b) exposure of a real account or credential belonging to Luca, and (c) legal liability — surfaced to Luca for recorded sign-off BEFORE any code is written. 'Touches a third-party service' includes: sending any credential or account identifier on the wire, calling undocumented/reverse-engineered endpoints, impersonating an official client, and scraping. Written after the 2026-07-15 PSN account lock: Epics 4 and 9 built a credentialed sync that impersonated the PSN Android app against undocumented endpoints — the ToS risk was known, researched (spike 9.1 probed the credential's authorization), stated in plain text in the specs, and yet never had a checkpoint that forced the accept/reject conversation; the account lock arrived, and Epic 11 deleted two epics of shipped work in a day. The lesson: a known risk without a named checkpoint is an unflagged bet. Anonymous, documented, credential-free calls (e.g. the public PS+ catalog endpoint) need only a one-line 'anonymous surface, no account identity' statement. At step-02, if the spec touches an external service and carries no risk flag, that is a BLOCK, not a nit; sibling of the destructive-migration CI gate — irreversible external risk gets the same human pause as irreversible data loss.",
]
